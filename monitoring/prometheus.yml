global:
  scrape_interval: 15s

scrape_configs:
  - job_name: earthnet-node
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]   # node /metrics
  - job_name: earthnet-relay
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8090"]   # relay /metrics
