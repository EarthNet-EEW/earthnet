# Local observability for EarthNet: scrapes node + relay /metrics.
#   docker compose -f monitoring/docker-compose.yml up -d
#   Prometheus → http://localhost:9090   ·   Grafana → http://localhost:3001
services:
  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach node/relay on the host (Linux)

  grafana:
    image: grafana/grafana:latest
    ports: ["3001:3000"]                       # 3001 to avoid clashing with the dashboard on 3000
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
    depends_on: [prometheus]
